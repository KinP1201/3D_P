<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버터와 대화하기 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FFF8E9;
    --butter: #F6C445;
    --butter-deep: #E3A61E;
    --fur-brown: #8C5A33;
    --fur-dark: #4A2F1C;
    --coral: #FF8B6A;
    --mint: #7CBFA0;
    --paw-ink: #C79A57;
    --shadow: rgba(140, 90, 51, 0.25);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 18%, rgba(246,196,69,0.35), transparent 40%),
      radial-gradient(circle at 88% 82%, rgba(124,191,160,0.25), transparent 40%),
      var(--cream);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--fur-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  /* scattered paw prints background */
  .paw-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    opacity:0.35;
  }
  .paw-bg span{
    position:absolute;
    font-size:28px;
    color:var(--paw-ink);
    opacity:0.5;
    transform:rotate(var(--r,0deg));
  }

  .app{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
    background:#fff;
    border-radius:28px;
    box-shadow:0 24px 60px var(--shadow), 0 2px 0 rgba(255,255,255,0.6) inset;
    overflow:hidden;
    border:3px solid var(--butter);
  }

  header{
    background:linear-gradient(160deg, var(--butter) 0%, var(--butter-deep) 100%);
    padding:22px 22px 26px;
    position:relative;
    color:var(--fur-dark);
  }

  header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height:22px;
    background:#fff;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
  }

  .header-row{
    display:flex;
    align-items:center;
    gap:14px;
    position:relative;
    z-index:2;
  }

  .title-block{
    flex:1;
  }

  #resetBtn{
    width:36px; height:36px;
    border-radius:50%;
    border:2px solid rgba(74,47,28,0.25);
    background:rgba(255,255,255,0.55);
    color:var(--fur-dark);
    font-size:17px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:transform 0.25s, background 0.15s;
  }
  #resetBtn:hover{ background:rgba(255,255,255,0.85); transform:rotate(-90deg); }

  .avatar{
    width:58px; height:58px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE9B3, #F0B23A 70%);
    border:3px solid #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    animation:bob 3s ease-in-out infinite;
    flex-shrink:0;
    overflow:hidden;
    padding:0;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    border-radius:50%;
    display:block;
  }

  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-4px) rotate(3deg); }
  }

  .title-block h1{
    margin:0;
    font-family:'Gaegu', sans-serif;
    font-size:26px;
    font-weight:700;
    line-height:1.1;
  }
  .title-block p{
    margin:2px 0 0;
    font-size:12.5px;
    font-weight:500;
    opacity:0.85;
  }

  .status-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--mint);
    display:inline-block;
    margin-right:5px;
    box-shadow:0 0 0 2px rgba(124,191,160,0.35);
  }

  main{
    height:56vh;
    min-height:380px;
    max-height:560px;
    overflow-y:auto;
    padding:20px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:
      linear-gradient(180deg, #fff, #fffdf7);
  }

  main::-webkit-scrollbar{ width:6px; }
  main::-webkit-scrollbar-thumb{ background:var(--butter); border-radius:10px; }

  .msg{
    max-width:78%;
    padding:11px 15px;
    border-radius:18px;
    font-size:15px;
    line-height:1.5;
    animation:pop 0.25s ease;
    word-break:break-word;
  }

  @keyframes pop{
    from{ opacity:0; transform:translateY(6px) scale(0.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .msg.butter{
    align-self:flex-start;
    background:#FFF1CE;
    border:2px solid var(--butter);
    border-bottom-left-radius:4px;
    color:var(--fur-dark);
  }

  .msg.user{
    align-self:flex-end;
    background:var(--fur-brown);
    color:#fff;
    border-bottom-right-radius:4px;
  }

  .msg-row{
    display:flex;
    align-items:flex-end;
    gap:6px;
  }
  .msg-row.butter{ align-self:flex-start; }
  .mini-paw{
    font-size:16px;
    margin-bottom:4px;
    flex-shrink:0;
  }

  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:12px 16px;
    background:#FFF1CE;
    border:2px solid var(--butter);
    border-radius:18px;
    border-bottom-left-radius:4px;
  }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--butter-deep);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.2s; }
  .typing span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{
    0%,80%,100%{ opacity:0.25; transform:translateY(0); }
    40%{ opacity:1; transform:translateY(-3px); }
  }

  form{
    display:flex;
    gap:8px;
    padding:14px 16px 18px;
    background:#fff;
    border-top:2px dashed #F1D89A;
  }

  #userInput{
    flex:1;
    padding:12px 16px;
    border-radius:20px;
    border:2px solid #F1D89A;
    font-size:15px;
    font-family:inherit;
    outline:none;
    background:var(--cream);
    color:var(--fur-dark);
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  #userInput:focus{
    border-color:var(--butter-deep);
    box-shadow:0 0 0 3px rgba(230,166,30,0.18);
  }

  #sendBtn{
    width:48px; height:48px;
    border-radius:50%;
    border:none;
    background:linear-gradient(160deg, var(--butter), var(--butter-deep));
    color:var(--fur-dark);
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 10px var(--shadow);
    transition:transform 0.15s;
    flex-shrink:0;
  }
  #sendBtn:hover{ transform:scale(1.08) rotate(-6deg); }
  #sendBtn:active{ transform:scale(0.95); }

  .quick-row{
    display:flex;
    gap:6px;
    padding:0 16px 12px;
    flex-wrap:wrap;
    background:#fff;
  }
  .quick-chip{
    border:1.5px solid var(--butter);
    background:#FFFBF0;
    color:var(--fur-brown);
    padding:6px 12px;
    border-radius:14px;
    font-size:12.5px;
    cursor:pointer;
    font-family:inherit;
    transition:background 0.15s, transform 0.15s;
  }
  .quick-chip:hover{ background:var(--butter); transform:translateY(-1px); }

  @media (max-width:520px){
    body{ padding:0; }
    .app{ border-radius:0; max-width:100%; min-height:100vh; }
    main{ height:auto; flex:1; min-height:0; max-height:none; }
  }
</style>
</head>

  // ---------- 채팅 로직 ----------
  const chatWindow = document.getElementById('chatWindow');
  const chatForm = document.getElementById('chatForm');
  const userInput = document.getElementById('userInput');

  function addMessage(text, sender){
    const row = document.createElement('div');
    row.className = 'msg-row ' + sender;

    if(sender === 'butter'){
      const paw = document.createElement('div');
      paw.className = 'mini-paw';
      paw.textContent = '🐾';
      row.appendChild(paw);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + sender;
    bubble.textContent = text;
    row.appendChild(bubble);

    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping(){
    const el = document.createElement('div');
    el.className = 'typing';
    el.id = 'typingIndicator';
    el.innerHTML = '<span></span><span></span><span></span>';
    chatWindow.appendChild(el);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function hideTyping(){
    const el = document.getElementById('typingIndicator');
    if(el) el.remove();
  }

  function getReply(input){
    const lower = input.toLowerCase();
    for(const item of RESPONSES){
      for(const kw of item.keywords){
        if(lower.includes(kw.toLowerCase())){
          return item.reply;
        }
      }
    }
    return FALLBACK_REPLIES[Math.floor(Math.random() * FALLBACK_REPLIES.length)];
  }

  function handleUserMessage(text){
    if(!text.trim()) return;
    addMessage(text, 'user');
    userInput.value = '';
    showTyping();
    const delay = 500 + Math.random() * 500;
    setTimeout(() => {
      hideTyping();
      addMessage(getReply(text), 'butter');
    }, delay);
  }

  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    handleUserMessage(userInput.value);
  });

  document.querySelectorAll('.quick-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      handleUserMessage(btn.dataset.text);
    });
  });

  function resetChat(){
    chatWindow.innerHTML = '';
    userInput.value = '';
    addMessage(GREETING, 'butter');
  }

  document.getElementById('resetBtn').addEventListener('click', resetChat);

  // 초기 인사
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => addMessage(GREETING, 'butter'), 400);
  });

  // 배경 발자국 랜덤 배치
  const pawBg = document.getElementById('pawBg');
  const pawEmojis = ['🐾'];
  for(let i=0; i<14; i++){
    const s = document.createElement('span');
    s.textContent = '🐾';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.setProperty('--r', (Math.random()*60-30)+'deg');
    s.style.fontSize = (16 + Math.random()*20) + 'px';
    pawBg.appendChild(s);
  }
</script>
